<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blobtype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@100..900&family=Montserrat:wght@100..900&family=Nunito:wght@200..1000&family=Oswald:wght@200..700&family=Playfair+Display:wght@400..900&family=Roboto+Condensed:wght@100..900&family=Rubik:wght@300..900&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --accent-color: #0015ff;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Control Panel */
        #controls {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
            z-index: 10;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: 500;
        }

        input[type="text"],
        select,
        textarea {
            background: #2b2b2b;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            min-height: 72px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.35;
        }

        select {
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        input[type="color"] {
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        .value-badge {
            float: right;
            color: var(--accent-color);
            font-weight: 700;
        }

        /* Canvas Preview Area */
        #display {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            position: relative;
        }

        canvas {
            max-width: 96%;
            max-height: 96%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
        }

        .checkbox-row input {
            accent-color: var(--accent-color);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="controls">
        <h2>Blobtype</h2>
        
        <div class="control-group">
            <label for="textInput">Text (use \n for line breaks)</label>
            <textarea id="textInput">Type\nsomething</textarea>
        </div>

        <div class="control-group">
            <label for="fontFamily">Typeface</label>
            <select id="fontFamily">
                <option value="Anton">Anton</option>
                <option value="Archivo Black">Archivo Black</option>
                <option value="Arial Black">Arial Black</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Impact">Impact</option>
                <option value="Inter">Inter</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Nunito">Nunito</option>
                <option value="Oswald">Oswald</option>
                <option value="Playfair Display">Playfair Display</option>
                <option value="Roboto Condensed">Roboto Condensed</option>
                <option value="Rubik">Rubik</option>
                <option value="Space Grotesk">Space Grotesk</option>
                <option value="Syne">Syne</option>
                <option value="Unbounded">Unbounded</option>
            </select>
        </div>

        <div class="control-group">
            <label for="fontSize">Size <span class="value-badge" id="fontSizeValue">120</span></label>
            <input type="range" id="fontSize" min="24" max="400" value="120">
        </div>

        <div class="control-group">
            <label for="lineHeight">Line Height <span class="value-badge" id="lineHeightValue">0.95</span></label>
            <input type="range" id="lineHeight" min="0.7" max="1.6" step="0.05" value="0.95">
        </div>

        <div class="control-group">
            <label for="letterSpacing">Tracking <span class="value-badge" id="letterSpacingValue">0.0</span></label>
            <input type="range" id="letterSpacing" min="-10" max="40" step="0.1" value="0">
        </div>

        <label class="checkbox-row">
            <input type="checkbox" id="uppercaseToggle" checked>
            Uppercase
        </label>

        <label class="checkbox-row">
            <input type="checkbox" id="fitTextToggle" checked>
            Fit text to canvas
        </label>

        <div class="control-group">
            <label for="blurAmount">Liquid Blur <span class="value-badge" id="blurValue">30</span></label>
            <input type="range" id="blurAmount" min="0" max="100" value="30" step="1">
        </div>

        <div class="control-group">
            <label for="dotSize">Halftone Grid Size <span class="value-badge" id="dotSizeValue">23</span></label>
            <input type="range" id="dotSize" min="0" max="100" value="23" step="1">
        </div>

        <div class="control-group">
            <label for="threshold">Contrast / Edge Sharpness <span class="value-badge" id="thresholdValue">49</span></label>
            <input type="range" id="threshold" min="0" max="100" value="49" step="1">
        </div>

        <div class="control-group">
            <label for="colorPicker">Ink Color</label>
            <input type="color" id="colorPicker" value="#ffffff">
        </div>
    </div>

    <div id="display">
        <canvas id="sandboxCanvas" width="1200" height="1500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sandboxCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // DOM Elements
        const textInput = document.getElementById('textInput');
        const fontFamilyInput = document.getElementById('fontFamily');
        const fontSizeInput = document.getElementById('fontSize');
        const lineHeightInput = document.getElementById('lineHeight');
        const letterSpacingInput = document.getElementById('letterSpacing');
        const uppercaseToggle = document.getElementById('uppercaseToggle');
        const fitTextToggle = document.getElementById('fitTextToggle');
        const blurInput = document.getElementById('blurAmount');
        const dotSizeInput = document.getElementById('dotSize');
        const thresholdInput = document.getElementById('threshold');
        const colorPicker = document.getElementById('colorPicker');
        const blurValue = document.getElementById('blurValue');
        const dotSizeValue = document.getElementById('dotSizeValue');
        const thresholdValue = document.getElementById('thresholdValue');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const lineHeightValue = document.getElementById('lineHeightValue');
        const letterSpacingValue = document.getElementById('letterSpacingValue');

        const CANVAS_WIDTH = 1200;
        const CANVAS_HEIGHT = 1500;
        const TEXT_PADDING = 80;
        const DEFAULT_FONT_WEIGHT = 700;

        function mapBlur(progress) {
            return (progress / 100) * 40;
        }

        function mapGrid(progress) {
            return Math.max(1, Math.round(1 + (progress / 100) * 24));
        }

        function mapThreshold(progress) {
            return Math.round((progress / 100) * 240);
        }

        function updateValueBadges() {
            blurValue.textContent = blurInput.value;
            dotSizeValue.textContent = dotSizeInput.value;
            thresholdValue.textContent = thresholdInput.value;
            fontSizeValue.textContent = fontSizeInput.value;
            lineHeightValue.textContent = parseFloat(lineHeightInput.value).toFixed(2);
            letterSpacingValue.textContent = parseFloat(letterSpacingInput.value).toFixed(1);
        }

        function getDisplayLines() {
            const raw = textInput.value.replace(/\\n/g, '\n');
            return uppercaseToggle.checked
                ? raw.split('\n').map((line) => line.toUpperCase())
                : raw.split('\n');
        }

        function buildFontString(size, family) {
            return `${DEFAULT_FONT_WEIGHT} ${size}px "${family}", sans-serif`;
        }

        function measureLineWidth(line, size, family, tracking) {
            ctx.font = buildFontString(size, family);
            let width = ctx.measureText(line).width;
            if (Math.abs(tracking) >= 0.05 && line.length > 1) {
                width += tracking * (line.length - 1);
            }
            return width;
        }

        function getEffectiveFontSize(lines, requestedSize, family, lineHeightRatio, tracking) {
            if (!fitTextToggle.checked || lines.length === 0) {
                return requestedSize;
            }

            const maxW = CANVAS_WIDTH - TEXT_PADDING * 2;
            const maxH = CANVAS_HEIGHT - TEXT_PADDING * 2;
            let size = requestedSize;

            for (let attempt = 0; attempt < 12; attempt++) {
                let widest = 0;
                lines.forEach((line) => {
                    widest = Math.max(widest, measureLineWidth(line, size, family, tracking));
                });
                const totalHeight = lines.length * size * lineHeightRatio;
                const scaleW = widest > maxW ? maxW / widest : 1;
                const scaleH = totalHeight > maxH ? maxH / totalHeight : 1;
                const scale = Math.min(scaleW, scaleH, 1);

                if (scale >= 0.999) {
                    return size;
                }
                size = Math.max(12, size * scale);
            }

            return size;
        }

        function drawLineText(line, x, y, tracking) {
            if (Math.abs(tracking) < 0.05) {
                ctx.fillText(line, x, y);
                return;
            }

            const chars = [...line];
            const charWidths = chars.map((char) => ctx.measureText(char).width);
            const totalWidth = charWidths.reduce((sum, width, index) => {
                return sum + width + (index < chars.length - 1 ? tracking : 0);
            }, 0);

            ctx.textAlign = 'left';
            let cursorX = x - totalWidth / 2;
            chars.forEach((char, index) => {
                ctx.fillText(char, cursorX, y);
                cursorX += charWidths[index] + (index < chars.length - 1 ? tracking : 0);
            });
            ctx.textAlign = 'center';
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }

        function draw() {
            const width = canvas.width;
            const height = canvas.height;

            // 1. Clear with deep black
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // 2. Draw Text with CSS Blur filter applied directly to canvas operations
            ctx.save();
            const blurProgress = parseFloat(blurInput.value);
            const blurVal = mapBlur(blurProgress);
            if (blurVal > 0) {
                ctx.filter = `blur(${blurVal}px)`;
            }
            
            ctx.fillStyle = '#ffffff'; // Draw pure white text first (to process luminosity)
            const requestedSize = parseInt(fontSizeInput.value, 10);
            const family = fontFamilyInput.value;
            const lineHeightRatio = parseFloat(lineHeightInput.value);
            const tracking = parseFloat(letterSpacingInput.value);
            const lines = getDisplayLines();
            const fSize = getEffectiveFontSize(lines, requestedSize, family, lineHeightRatio, tracking);

            ctx.font = buildFontString(fSize, family);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const lineHeight = fSize * lineHeightRatio;
            const totalHeight = lines.length * lineHeight;
            let startY = (height - totalHeight) / 2 + lineHeight / 2;

            lines.forEach((line) => {
                drawLineText(line, width / 2, startY, tracking);
                startY += lineHeight;
            });
            ctx.restore();

            // 3. Process image data into customized grid halftones with Thresholding
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // Clear canvas to rebuild it dot by dot
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            const gridProgress = parseInt(dotSizeInput.value);
            const threshProgress = parseInt(thresholdInput.value);
            const grid = mapGrid(gridProgress);
            const thresh = mapThreshold(threshProgress);
            const targetColor = hexToRgb(colorPicker.value);

            ctx.fillStyle = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;

            // Step through pixel grid
            for (let y = 0; y < height; y += grid) {
                for (let x = 0; x < width; x += grid) {
                    
                    // Calculate average brightness in this grid block
                    let totalBrightness = 0;
                    let count = 0;

                    for (let cy = 0; cy < grid && (y + cy) < height; cy++) {
                        for (let cx = 0; cx < grid && (x + cx) < width; cx++) {
                            const pixelIndex = ((y + cy) * width + (x + cx)) * 4;
                            // White text means R, G, and B are equal brightness values
                            totalBrightness += data[pixelIndex]; 
                            count++;
                        }
                    }

                    const avgBrightness = totalBrightness / count;

                    // Threshold cutoff: if bright enough, draw dynamic blob or perfect circle
                    if (avgBrightness > thresh) {
                        // Dynamic dot radius mapped to brightness values
                        const factor = (avgBrightness / 255);
                        const radius = (grid / 2) * Math.min(1.4, factor * 1.5); 
                        
                        ctx.beginPath();
                        ctx.arc(x + grid / 2, y + grid / 2, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        // Attach Event Listeners for real-time changes
        [
            textInput, fontFamilyInput, fontSizeInput,
            lineHeightInput, letterSpacingInput, uppercaseToggle, fitTextToggle,
            blurInput, dotSizeInput, thresholdInput, colorPicker
        ].forEach(element => {
            element.addEventListener('input', () => {
                updateValueBadges();
                draw();
            });
            element.addEventListener('change', () => {
                updateValueBadges();
                draw();
            });
        });

        // Initial render on load
        window.onload = () => {
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            updateValueBadges();
            draw();
        };
    </script>
</body>
</html>
