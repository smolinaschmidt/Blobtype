<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Halftone Playground</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --accent-color: #0015ff;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Control Panel */
        #controls {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
            z-index: 10;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: 500;
        }

        input[type="text"] {
            background: #2b2b2b;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        input[type="color"] {
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        .value-badge {
            float: right;
            color: var(--accent-color);
            font-weight: 700;
        }

        #playBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            margin-top: 10px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        #playBtn:hover {
            background: #3344ff;
        }

        #playBtn:active {
            transform: scale(0.98);
        }

        #playBtn.playing {
            background: #333;
            border: 1px solid #555;
        }

        #playBtn .icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        /* Canvas Preview Area */
        #display {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            position: relative;
        }

        canvas {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }
    </style>
</head>
<body>

    <div id="controls">
        <h2>Blob Generator</h2>
        
        <div class="control-group">
            <label for="textInput">Text (Use \n for new line)</label>
            <input type="text" id="textInput" value="LES\nLAB">
        </div>

        <div class="control-group">
            <label for="fontSize">Font Size</label>
            <input type="range" id="fontSize" min="40" max="200" value="120">
        </div>

        <div class="control-group">
            <label for="blurAmount">Liquid Blur (Stage Transition) <span class="value-badge" id="blurValue">30</span></label>
            <input type="range" id="blurAmount" min="0" max="100" value="30" step="1">
        </div>

        <div class="control-group">
            <label for="dotSize">Halftone Grid Size <span class="value-badge" id="dotSizeValue">23</span></label>
            <input type="range" id="dotSize" min="0" max="100" value="23" step="1">
        </div>

        <div class="control-group">
            <label for="threshold">Contrast / Edge Sharpness <span class="value-badge" id="thresholdValue">49</span></label>
            <input type="range" id="threshold" min="0" max="100" value="49" step="1">
        </div>

        <div class="control-group">
            <label for="colorPicker">Ink Color</label>
            <input type="color" id="colorPicker" value="#ff007f">
        </div>

        <button type="button" id="playBtn">
            <span class="icon">▶</span>
            <span class="label">Play Animation</span>
        </button>
    </div>

    <div id="display">
        <canvas id="sandboxCanvas" width="800" height="1000"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sandboxCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // DOM Elements
        const textInput = document.getElementById('textInput');
        const fontSizeInput = document.getElementById('fontSize');
        const blurInput = document.getElementById('blurAmount');
        const dotSizeInput = document.getElementById('dotSize');
        const thresholdInput = document.getElementById('threshold');
        const colorPicker = document.getElementById('colorPicker');
        const playBtn = document.getElementById('playBtn');
        const blurValue = document.getElementById('blurValue');
        const dotSizeValue = document.getElementById('dotSizeValue');
        const thresholdValue = document.getElementById('thresholdValue');

        let isAnimating = false;
        let animationId = null;
        let animationStart = 0;
        let textOffsetX = 0;
        let textOffsetY = 0;
        let savedValues = null;

        const ANIMATION_DURATION = 4000;

        function mapBlur(progress) {
            return (progress / 100) * 40;
        }

        function mapGrid(progress) {
            return Math.max(1, Math.round(1 + (progress / 100) * 24));
        }

        function mapThreshold(progress) {
            return Math.round((progress / 100) * 240);
        }

        function updateValueBadges() {
            blurValue.textContent = blurInput.value;
            dotSizeValue.textContent = dotSizeInput.value;
            thresholdValue.textContent = thresholdInput.value;
        }

        function setAnimatedValues(progress) {
            blurInput.value = progress;
            dotSizeInput.value = progress;
            thresholdInput.value = progress;
            updateValueBadges();
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 0, b: 127 };
        }

        function draw() {
            const width = canvas.width;
            const height = canvas.height;

            // 1. Clear with deep black
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // 2. Draw Text with CSS Blur filter applied directly to canvas operations
            ctx.save();
            const blurProgress = parseFloat(blurInput.value);
            const blurVal = mapBlur(blurProgress);
            if (blurVal > 0) {
                ctx.filter = `blur(${blurVal}px)`;
            }
            
            ctx.fillStyle = '#ffffff'; // Draw pure white text first (to process luminosity)
            const fSize = parseInt(fontSizeInput.value);
            ctx.font = `900 ${fSize}px "Arial Black", Impact, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Split lines by "\n"
            const lines = textInput.value.replace(/\\n/g, '\n').split('\n');
            const lineHeight = fSize * 0.95;
            const totalHeight = lines.length * lineHeight;
            let startY = (height - totalHeight) / 2 + lineHeight / 2;

            lines.forEach((line) => {
                ctx.fillText(line.toUpperCase(), width / 2 + textOffsetX, startY + textOffsetY);
                startY += lineHeight;
            });
            ctx.restore();

            // 3. Process image data into customized grid halftones with Thresholding
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // Clear canvas to rebuild it dot by dot
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            const gridProgress = parseInt(dotSizeInput.value);
            const threshProgress = parseInt(thresholdInput.value);
            const grid = mapGrid(gridProgress);
            const thresh = mapThreshold(threshProgress);
            const targetColor = hexToRgb(colorPicker.value);

            ctx.fillStyle = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;

            // Step through pixel grid
            for (let y = 0; y < height; y += grid) {
                for (let x = 0; x < width; x += grid) {
                    
                    // Calculate average brightness in this grid block
                    let totalBrightness = 0;
                    let count = 0;

                    for (let cy = 0; cy < grid && (y + cy) < height; cy++) {
                        for (let cx = 0; cx < grid && (x + cx) < width; cx++) {
                            const pixelIndex = ((y + cy) * width + (x + cx)) * 4;
                            // White text means R, G, and B are equal brightness values
                            totalBrightness += data[pixelIndex]; 
                            count++;
                        }
                    }

                    const avgBrightness = totalBrightness / count;

                    // Threshold cutoff: if bright enough, draw dynamic blob or perfect circle
                    if (avgBrightness > thresh) {
                        // Dynamic dot radius mapped to brightness values
                        const factor = (avgBrightness / 255);
                        const radius = (grid / 2) * Math.min(1.4, factor * 1.5); 
                        
                        ctx.beginPath();
                        ctx.arc(x + grid / 2, y + grid / 2, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function animate(timestamp) {
            if (!animationStart) animationStart = timestamp;
            const elapsed = timestamp - animationStart;
            const rawProgress = Math.min(elapsed / ANIMATION_DURATION, 1);
            const progress = easeInOutCubic(rawProgress) * 100;

            setAnimatedValues(Math.round(progress));

            const wave = rawProgress * Math.PI * 2;
            textOffsetX = Math.sin(wave) * 30 * rawProgress;
            textOffsetY = Math.cos(wave * 0.8) * 20 * rawProgress;

            draw();

            if (rawProgress < 1) {
                animationId = requestAnimationFrame(animate);
            } else {
                stopAnimation(false);
            }
        }

        function startAnimation() {
            savedValues = {
                blur: blurInput.value,
                dotSize: dotSizeInput.value,
                threshold: thresholdInput.value
            };

            isAnimating = true;
            animationStart = 0;
            textOffsetX = 0;
            textOffsetY = 0;

            setAnimatedValues(0);
            playBtn.classList.add('playing');
            playBtn.querySelector('.icon').textContent = '■';
            playBtn.querySelector('.label').textContent = 'Stop';

            animationId = requestAnimationFrame(animate);
        }

        function stopAnimation(restore = true) {
            isAnimating = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            animationStart = 0;
            textOffsetX = 0;
            textOffsetY = 0;

            if (restore && savedValues) {
                blurInput.value = savedValues.blur;
                dotSizeInput.value = savedValues.dotSize;
                thresholdInput.value = savedValues.threshold;
                updateValueBadges();
            }

            savedValues = null;
            playBtn.classList.remove('playing');
            playBtn.querySelector('.icon').textContent = '▶';
            playBtn.querySelector('.label').textContent = 'Play Animation';
            draw();
        }

        playBtn.addEventListener('click', () => {
            if (isAnimating) {
                stopAnimation(true);
            } else {
                startAnimation();
            }
        });

        // Attach Event Listeners for real-time changes
        [textInput, fontSizeInput, blurInput, dotSizeInput, thresholdInput, colorPicker].forEach(element => {
            element.addEventListener('input', () => {
                updateValueBadges();
                if (!isAnimating) draw();
            });
        });

        // Initial render on load
        window.onload = () => {
            updateValueBadges();
            draw();
        };
    </script>
</body>
</html>
